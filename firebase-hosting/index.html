<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroid — Music Discovery</title>
  <meta name="description" content="Asteroid is a music-discovery platform supporting independent artists. Visit www.asteroid8.net.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; color: #fff;
      font-family: 'Poppins', sans-serif; text-align: center; padding: 24px;
    }
    .wrap { max-width: 420px; }
    h1 { font-size: 30px; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.5px; }
    h1 span { color: #ff7f50; }
    p { color: rgba(255, 255, 255, 0.6); font-size: 15px; line-height: 1.6; margin-bottom: 26px; }
    a.btn {
      display: inline-block; padding: 13px 30px; border-radius: 10px;
      background: linear-gradient(135deg, #ff7f50, #e85d2c);
      color: #fff; font-weight: 600; text-decoration: none; font-size: 15px;
    }
    a.btn:hover { filter: brightness(1.06); }
    .foot { margin-top: 30px; font-size: 12px; color: rgba(255, 255, 255, 0.3); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Asteroid<span>.</span></h1>
    <p>Asteroid is a music-discovery platform supporting independent artists and listeners.
       This address hosts application services only — visit our main site to listen, follow artists, and sign in.</p>
    <a class="btn" href="https://www.asteroid8.net">Go to asteroid8.net</a>
    <div class="foot">© Asteroid</div>
  </div>
</body>
</html>
