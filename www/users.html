<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users · Asteroid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    :root { --coral: #ff7f50; --coral-dark: #e66a3a; --bg: #060606; --card: #101010; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: #fff;
      font-family: 'Poppins', sans-serif;
      padding: 0 0 calc(100px + env(safe-area-inset-bottom, 0px));
    }
    .page-head {
      padding: 28px 20px 18px;
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(180deg, rgba(6,6,6,0.95), rgba(6,6,6,0.85));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,127,80,0.15);
      display: flex; align-items: center; gap: 14px;
    }
    .page-head a.back {
      color: #fff; text-decoration: none; display: flex; align-items: center;
      gap: 4px; font-size: 13px; padding: 6px 10px; border-radius: 10px;
      background: rgba(255,255,255,0.05); transition: background 0.2s;
    }
    .page-head a.back:hover { background: rgba(255,255,255,0.1); }
    .page-head h1 {
      margin: 0; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800;
      display: flex; align-items: center; gap: 10px;
    }
    .page-head h1 .material-symbols-outlined { color: var(--coral); font-size: 30px; }

    .search-wrap { padding: 16px 20px; }
    .search-inner {
      position: relative; max-width: 620px; margin: 0 auto;
    }
    .search-inner .material-symbols-outlined.search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.55); font-size: 22px; pointer-events: none;
    }
    .search-inner input {
      width: 100%; padding: 13px 44px 13px 44px;
      background: var(--card); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; color: #fff; font-size: 14px;
      outline: none; transition: border-color 0.2s, background 0.2s;
      font-family: 'Poppins', sans-serif;
    }
    .search-inner input::placeholder { color: rgba(255,255,255,0.4); }
    .search-inner input:focus { border-color: var(--coral); background: #141414; }
    .clear-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: transparent; border: none; color: rgba(255,255,255,0.5);
      cursor: pointer; padding: 8px; display: none; border-radius: 999px;
    }
    .clear-btn.visible { display: flex; }
    .clear-btn:hover { color: var(--coral); background: rgba(255,127,80,0.1); }

    .count-row {
      padding: 0 20px; font-size: 12px; color: rgba(255,255,255,0.5);
      text-align: center; margin-bottom: 12px;
    }

    .users-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px; padding: 4px 20px 24px;
      max-width: 1200px; margin: 0 auto;
    }
    .user-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px; padding: 18px 14px; text-align: center;
      cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .user-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,127,80,0.35);
      box-shadow: 0 10px 26px rgba(255,127,80,0.12);
    }
    .user-avatar {
      width: 64px; height: 64px; margin: 0 auto 12px; border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), var(--coral-dark));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 24px;
      color: #fff; overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name {
      font-weight: 700; font-size: 14px; margin-bottom: 4px;
      font-family: 'Montserrat', sans-serif; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-role {
      font-size: 11px; color: var(--coral); font-weight: 600;
    }
    .user-bio {
      font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 6px;
      line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .state-msg {
      grid-column: 1/-1; padding: 46px 20px; text-align: center;
      color: rgba(255,255,255,0.55); font-size: 13px;
    }
    .state-msg .material-symbols-outlined {
      font-size: 48px; color: rgba(255,127,80,0.5); margin-bottom: 8px;
    }

    /* Modal */
    .user-modal {
      position: fixed; inset: 0; z-index: 99998;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .user-modal.active { display: flex; }
    .user-modal-card {
      background: #0e0e0e; border: 1px solid rgba(255,127,80,0.2);
      border-radius: 22px; padding: 28px 22px; max-width: 420px; width: 100%;
      text-align: center; position: relative; max-height: 80vh; overflow-y: auto;
    }
    .user-modal-close {
      position: absolute; top: 10px; right: 10px;
      background: rgba(255,255,255,0.06); border: none; color: #fff;
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .user-modal-close:hover { background: rgba(255,127,80,0.2); color: var(--coral); }
    .user-modal .user-avatar { width: 88px; height: 88px; font-size: 32px; margin-bottom: 16px; }
    .user-modal-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; margin: 0 0 4px; }
    .user-modal-role { color: var(--coral); font-weight: 600; font-size: 13px; margin-bottom: 12px; }
    .user-modal-bio { color: rgba(255,255,255,0.75); font-size: 13px; line-height: 1.5; margin-bottom: 18px; }
    .user-social-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 14px; }
    .user-social-links a {
      padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
      color: var(--coral); border: 1px solid rgba(255,127,80,0.3);
      text-decoration: none; transition: all 0.2s;
    }
    .user-social-links a:hover { background: var(--coral); color: #fff; }

    .user-follow-wrap { margin-top: 18px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .user-follow-btn {
      padding: 10px 22px; border-radius: 12px; background: var(--coral); color: #000;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 13px;
      border: none; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .user-follow-btn:hover:not(:disabled) { background: var(--coral-dark); }
    .user-follow-btn:disabled { opacity: 0.7; cursor: default; background: rgba(255,127,80,0.25); color: #fff; }
    .user-follow-btn.following { background: rgba(255,127,80,0.15); color: var(--coral); border: 1px solid rgba(255,127,80,0.5); }
    .user-follow-hint { font-size: 11px; color: rgba(255,255,255,0.5); max-width: 320px; line-height: 1.4; }

    .user-songs { margin-top: 22px; text-align: left; }
    .user-songs-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; color: #fff; margin-bottom: 10px; text-align: center; }
    .user-song-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; margin-bottom: 8px;
    }
    .user-song-info { flex: 1; min-width: 0; }
    .user-song-title { font-weight: 600; font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-song-meta { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-song-actions { display: flex; gap: 6px; }
    .user-song-btn {
      background: transparent; border: 1px solid rgba(255,127,80,0.4); color: var(--coral);
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .user-song-btn:hover { background: var(--coral); color: #000; }
    .user-song-btn .material-symbols-outlined { font-size: 18px; }
    .user-songs-empty { font-size: 12px; color: rgba(255,255,255,0.45); text-align: center; padding: 10px 0; }

    .mobile-nav {
      position: fixed; bottom: 0; left: 0; right: 0; width: 100%;
      z-index: 99999; background: #0a0a0a;
      border-top: 1px solid rgba(255,127,80,0.25);
      padding: 6px 0 max(6px, env(safe-area-inset-bottom));
      display: flex; justify-content: space-around; align-items: center;
    }
    .mobile-nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      text-decoration: none; color: rgba(255,255,255,0.5);
      font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 500;
      padding: 4px 12px; border-radius: 10px; transition: color 0.2s, background 0.2s;
    }
    .mobile-nav-item .material-symbols-outlined { font-size: 24px; }
    .mobile-nav-item.mobile-nav-active,
    .mobile-nav-item:hover { color: var(--coral); }
    .mobile-nav-item.mobile-nav-active { background: rgba(255,127,80,0.1); }
  </style>
</head>
<body>
  <header class="page-head">
    <a href="charts.html" class="back" aria-label="Back"><span class="material-symbols-outlined">arrow_back</span></a>
    <h1><span class="material-symbols-outlined">group</span> Users</h1>
  </header>

  <div class="search-wrap">
    <div class="search-inner">
      <span class="material-symbols-outlined search-icon">search</span>
      <input type="text" id="userSearchInput" placeholder="Search users by name, bio or role…" autocomplete="off" />
      <button class="clear-btn" id="clearBtn" aria-label="Clear"><span class="material-symbols-outlined">close</span></button>
    </div>
  </div>

  <div class="count-row" id="countRow"></div>

  <div class="users-grid" id="usersGrid">
    <div class="state-msg"><span class="material-symbols-outlined">hourglass_top</span><br>Loading users…</div>
  </div>

  <div class="user-modal" id="userModal" role="dialog" aria-modal="true">
    <div class="user-modal-card">
      <button class="user-modal-close" id="modalCloseBtn" aria-label="Close"><span class="material-symbols-outlined">close</span></button>
      <div class="user-avatar" id="modalAvatar"></div>
      <h2 class="user-modal-name" id="modalName"></h2>
      <div class="user-modal-role" id="modalRole"></div>
      <div id="modalFollowerStats" style="display:flex;gap:18px;justify-content:center;font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:10px;font-family:'Poppins',sans-serif;"></div>
      <p class="user-modal-bio" id="modalBio"></p>
      <div class="user-social-links" id="modalSocialLinks"></div>
      <div class="user-follow-wrap" id="modalFollowWrap" style="display:none;">
        <button class="user-follow-btn" id="modalFollowBtn" type="button">Follow artist</button>
        <p class="user-follow-hint" id="modalFollowHint">Their posts will show up under “From artists you follow” on your home page.</p>
      </div>
      <a id="modalQALink" href="#" style="display:none;margin-top:12px;padding:11px;text-align:center;background:rgba(255,122,89,0.1);border:1px solid rgba(255,122,89,0.25);border-radius:12px;color:#ff7a59;font-weight:700;font-size:13px;text-decoration:none;font-family:Montserrat,sans-serif;">
        <span style="vertical-align:middle;margin-right:6px;">💬</span> Ask a question
      </a>
      <div class="user-songs" id="modalSongsSection" style="display:none;">
        <div class="user-songs-title">Songs</div>
        <div id="modalSongsList"><p class="user-songs-empty">Loading tracks…</p></div>
      </div>
    </div>
  </div>

  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item"><span class="material-symbols-outlined">home</span><span>Home</span></a>
    <a href="lively.html" class="mobile-nav-item"><span class="material-symbols-outlined">mic</span><span>Concerts</span></a>
    <a href="studio.html" class="mobile-nav-item"><span class="material-symbols-outlined">upload</span><span>Upload</span></a>
    <a href="pat.html" class="mobile-nav-item"><span class="material-symbols-outlined">queue_music</span><span>Playlist</span></a>
    <a href="charts.html" class="mobile-nav-item mobile-nav-active"><span class="material-symbols-outlined">leaderboard</span><span>Charts</span></a>
  </nav>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getDatabase, ref, get, set, remove, onValue, push } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-6qtVYHfipL_c6g5JzXKXCxMN5WDKU7A",
      authDomain: "asteroid-cdc13.firebaseapp.com",
      databaseURL: "https://asteroid-cdc13-default-rtdb.firebaseio.com",
      projectId: "asteroid-cdc13",
      storageBucket: "asteroid-cdc13.appspot.com",
      messagingSenderId: "793353824502",
      appId: "1:793353824502:web:3ac24821911d14773ba4d7"
    };
    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    // Expose globals so the shared mini-player (js/miniplayer.js) can play / queue tracks.
    window.firebaseDatabase = db;
    window.firebaseRef = ref;
    window.firebaseGet = get;
    window.firebaseSet = set;
    window.firebaseRemove = remove;
    window.firebaseOnValue = onValue;
    window.firebasePush = push;
    window.firebaseAuth = auth;

    const RTDB_BASE_USERS = 'https://asteroid-cdc13-default-rtdb.firebaseio.com';
    // REST GET wrapper — bypasses the SDK WebSocket so a stalled realtime
    // connection can't leave reads hanging forever. Returns parsed JSON or null.
    function restGet(path) {
      const url = RTDB_BASE_USERS + '/' + String(path || '').replace(/^\//, '') + '.json';
      return fetch(url, { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    }

    function sanitizeKeyPart(s) {
      return String(s || "").replace(/[.#$[\]]/g, "_");
    }
    // Matches index.html getViewerFollowKeyForFollow + followed-notices.js viewerFollowKey.
    function viewerFollowKey() {
      const ek = (localStorage.getItem("emailKey") || "").trim();
      if (ek) return ek;
      const cu = (localStorage.getItem("CurrentUser") || "").trim();
      const em = (localStorage.getItem("email") || "").trim();
      const id = cu || em;
      if (id) return sanitizeKeyPart(id);
      return "";
    }
    function isSignedInForFollow() {
      try { if (auth && auth.currentUser) return true; } catch (e) {}
      return (
        localStorage.getItem("asteroidSignedInBefore") === "true" ||
        !!(localStorage.getItem("emailKey") || "").trim() ||
        !!(localStorage.getItem("CurrentUser") || "").trim()
      );
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function prettifyUrl(url) {
      try {
        const h = new URL(url).hostname.replace('www.', '').replace('open.', '');
        if (/instagram/i.test(h)) return 'Instagram';
        if (/spotify/i.test(h)) return 'Spotify';
        if (/soundcloud/i.test(h)) return 'SoundCloud';
        if (/youtube|youtu\.be/i.test(h)) return 'YouTube';
        if (/tiktok/i.test(h)) return 'TikTok';
        if (/apple/i.test(h)) return 'Apple Music';
        if (/bandcamp/i.test(h)) return 'Bandcamp';
        return h.split('.')[0].charAt(0).toUpperCase() + h.split('.')[0].slice(1);
      } catch (e) { return 'Link'; }
    }

    let allUsers = [];
    const gridEl = document.getElementById('usersGrid');
    const countEl = document.getElementById('countRow');
    const searchEl = document.getElementById('userSearchInput');
    const clearBtn = document.getElementById('clearBtn');

    function resolveRole(profile) {
      const vis = String(profile.profileVisibility || '').toLowerCase();
      const roleText = String(profile.role || '').toLowerCase();
      if (vis === 'public' || roleText.includes('artist')) return 'Artist';
      if (vis === 'private' || roleText.includes('listener')) return 'Listener';
      const hasAnyArtist = profile.instagram || profile.soundcloud || profile.spotify || profile.youtube || profile.applemusic || profile.bandcamp;
      return hasAnyArtist ? 'Artist' : 'Listener';
    }
    function isPublicArtist(profile) {
      if (!profile) return false;
      const vis = String(profile.profileVisibility || '').toLowerCase();
      if (vis === 'private') return false;
      if (profile.publicProfile === false) return false;
      return resolveRole(profile) === 'Artist';
    }

    function render(list) {
      if (!list.length) {
        gridEl.innerHTML = `<div class="state-msg"><span class="material-symbols-outlined">person_search</span><br>No users found.<br><span style="font-size:12px;opacity:0.7;">Try a different search term.</span></div>`;
        countEl.textContent = '';
        return;
      }
      countEl.textContent = `${list.length} ${list.length === 1 ? 'user' : 'users'}`;
      gridEl.innerHTML = list.map((u, i) => {
        const name = u.name || 'User';
        const role = u.role;
        const initial = name.trim().charAt(0).toUpperCase() || 'U';
        const avatarHtml = u.avatar
          ? `<div class="user-avatar"><img src="${escHtml(u.avatar)}" alt=""></div>`
          : `<div class="user-avatar">${escHtml(initial)}</div>`;
        const bio = u.bio
          ? `<div class="user-bio">${escHtml(u.bio)}</div>`
          : '';
        return `
          <div class="user-card" data-idx="${i}" role="button" tabindex="0">
            ${avatarHtml}
            <div class="user-name">${escHtml(name)}</div>
            <div class="user-role">${escHtml(role)}</div>
            ${bio}
          </div>`;
      }).join('');
      gridEl.querySelectorAll('.user-card').forEach(c => {
        c.addEventListener('click', () => openModal(list[Number(c.dataset.idx)]));
      });
    }

    async function loadArtistSongs(artistKey, profile) {
      const mount = document.getElementById('modalSongsList');
      const section = document.getElementById('modalSongsSection');
      if (!mount || !section) return;
      section.style.display = 'block';
      mount.innerHTML = '<p class="user-songs-empty">Loading tracks…</p>';
      try {
        const all = await restGet('SONGS');
        if (!all) { mount.innerHTML = '<p class="user-songs-empty">No songs yet.</p>'; return; }
        const profileEmail = String((profile && (profile.email || '')) || '').trim();
        const keyVariants = new Set();
        if (artistKey) keyVariants.add(artistKey);
        if (profileEmail) {
          keyVariants.add(profileEmail);
          keyVariants.add(sanitizeKeyPart(profileEmail));
          keyVariants.add(sanitizeKeyPart(profileEmail.toLowerCase()));
        }
        const matches = [];
        for (const titleKey in all) {
          for (const albumKey in all[titleKey]) {
            for (const artistKeyInner in all[titleKey][albumKey]) {
              const s = all[titleKey][albumKey][artistKeyInner];
              if (!s || !s.fileInp) continue;
              const uploaderRaw = String(s.uploader || '').trim();
              if (!uploaderRaw) continue;
              const uploaderKey = sanitizeKeyPart(uploaderRaw);
              const uploaderKeyLc = sanitizeKeyPart(uploaderRaw.toLowerCase());
              if (keyVariants.has(uploaderRaw) || keyVariants.has(uploaderKey) || keyVariants.has(uploaderKeyLc)) {
                matches.push({
                  title: s.title || titleKey.replace(/_/g, ' '),
                  artist: s.artist || profile?.nickname || 'Unknown',
                  album: s.album || '',
                  src: s.fileInp,
                  imageUrl: s.imageUrl || profile?.profilePicture || profile?.profileImage || '',
                  createdAt: s.createdAt || 0,
                });
              }
            }
          }
        }
        matches.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        if (!matches.length) {
          mount.innerHTML = '<p class="user-songs-empty">No tracks uploaded through Asteroid Studio yet.</p>';
          return;
        }
        mount.innerHTML = matches.slice(0, 50).map((s, i) => `
          <div class="user-song-row" data-i="${i}">
            <div class="user-song-info">
              <div class="user-song-title">${escHtml(s.title)}</div>
              <div class="user-song-meta">${escHtml(s.artist)}${s.album ? ' · ' + escHtml(s.album) : ''}</div>
            </div>
            <div class="user-song-actions">
              <button class="user-song-btn" data-action="play" aria-label="Play"><span class="material-symbols-outlined">play_arrow</span></button>
              <button class="user-song-btn" data-action="queue" aria-label="Add to queue"><span class="material-symbols-outlined">queue_music</span></button>
            </div>
          </div>`).join('');
        mount.querySelectorAll('.user-song-row').forEach((row) => {
          const i = Number(row.dataset.i || 0);
          const s = matches[i];
          row.querySelector('[data-action="play"]')?.addEventListener('click', () => {
            if (window.AsteroidPlayer) window.AsteroidPlayer.play(s);
          });
          row.querySelector('[data-action="queue"]')?.addEventListener('click', () => {
            if (window.AsteroidPlayer) window.AsteroidPlayer.enqueue(s);
          });
        });
      } catch (e) {
        console.warn('[users] load songs', e);
        mount.innerHTML = '<p class="user-songs-empty">Could not load tracks.</p>';
      }
    }

    async function wireFollowButton(u) {
      const wrap = document.getElementById('modalFollowWrap');
      const btn = document.getElementById('modalFollowBtn');
      const hint = document.getElementById('modalFollowHint');
      if (!wrap || !btn || !hint) return;
      if (!u || !u.key) { wrap.style.display = 'none'; return; }
      const vk = viewerFollowKey();
      if (vk && vk === u.key) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'flex';
      btn.classList.remove('following');
      btn.onclick = null;
      if (!vk) {
        btn.textContent = 'Sign in to follow';
        btn.disabled = true;
        hint.textContent = 'Sign in on the home page first, then reload this page to follow.';
        return;
      }
      btn.textContent = 'Loading…';
      btn.disabled = true;
      hint.textContent = '';
      let following = false;
      try {
        const val = await restGet('FOLLOWING/' + vk + '/' + u.key);
        following = val === true;
      } catch (e) {
        console.warn('follow state read failed', e);
        hint.textContent = 'Could not check follow state: ' + (e && e.message ? e.message : 'network error');
      }
      const renderState = () => {
        if (following) {
          btn.textContent = 'Following · tap to unfollow';
          btn.classList.add('following');
          hint.textContent = 'You’ll see their posts under “From artists you follow” on the home page.';
        } else {
          btn.textContent = 'Follow artist';
          btn.classList.remove('following');
          hint.textContent = 'Their posts will show up under “From artists you follow” on your home page.';
        }
        btn.disabled = false;
      };
      renderState();
      btn.onclick = async () => {
        btn.disabled = true;
        const prev = following;
        try {
          if (following) {
            await Promise.all([
              remove(ref(db, 'FOLLOWING/' + vk + '/' + u.key)),
              remove(ref(db, 'FOLLOWS/' + u.key + '/' + vk)),
            ]);
            following = false;
          } else {
            await Promise.all([
              set(ref(db, 'FOLLOWING/' + vk + '/' + u.key), true),
              set(ref(db, 'FOLLOWS/' + u.key + '/' + vk), true),
            ]);
            following = true;
          }
          renderState();
        } catch (e) {
          console.warn('follow toggle failed', e);
          following = prev;
          renderState();
          hint.textContent = 'Could not save follow: ' + (e && e.message ? e.message : 'unknown error') + '. Check your connection and try again.';
        }
      };
    }

    function openModal(u) {
      if (!u) return;
      const modal = document.getElementById('userModal');
      const name = u.name || 'User';
      const initial = name.trim().charAt(0).toUpperCase() || 'U';
      const avatarEl = document.getElementById('modalAvatar');
      avatarEl.innerHTML = u.avatar
        ? `<img src="${escHtml(u.avatar)}" alt="">`
        : escHtml(initial);
      document.getElementById('modalName').textContent = name;
      document.getElementById('modalRole').textContent = u.role;
      document.getElementById('modalBio').textContent = u.bio || (u.role === 'Artist' ? 'This artist hasn\'t added a bio yet.' : '');
      const linksEl = document.getElementById('modalSocialLinks');
      if (u.links && u.links.length) {
        linksEl.innerHTML = u.links.map(l =>
          `<a href="${escHtml(l)}" target="_blank" rel="noopener">${escHtml(prettifyUrl(l))}</a>`
        ).join('');
      } else {
        linksEl.innerHTML = '';
      }
      // Follower / following counts
      const statsEl = document.getElementById('modalFollowerStats');
      if (statsEl) {
        statsEl.innerHTML = '';
        if (u.key) {
          Promise.all([
            get(ref(db, 'FOLLOWS/' + u.key)).catch(() => null),
            get(ref(db, 'FOLLOWING/' + u.key)).catch(() => null)
          ]).then(function([fSnap, gSnap]) {
            const nf = fSnap && fSnap.exists() ? Object.keys(fSnap.val()).length : 0;
            const ng = gSnap && gSnap.exists() ? Object.keys(gSnap.val()).length : 0;
            statsEl.innerHTML =
              '<span><b style="color:#fff;font-weight:700;">' + nf + '</b> followers</span>' +
              '<span><b style="color:#fff;font-weight:700;">' + ng + '</b> following</span>';
          }).catch(function() {});
        }
      }

      document.getElementById('modalSongsSection').style.display = 'none';
      document.getElementById('modalFollowWrap').style.display = 'none';
      const qaLink = document.getElementById('modalQALink');
      if (qaLink) {
        if (u.key) { qaLink.href = 'qa.html?artist=' + encodeURIComponent(u.key); qaLink.style.display = 'block'; }
        else qaLink.style.display = 'none';
      }
      if (u.key) {
        void loadArtistSongs(u.key, u.profile || {});
        void wireFollowButton(u);
      }
      modal.classList.add('active');
    }
    document.getElementById('modalCloseBtn').addEventListener('click', () => {
      document.getElementById('userModal').classList.remove('active');
    });
    document.getElementById('userModal').addEventListener('click', (e) => {
      if (e.target.id === 'userModal') e.currentTarget.classList.remove('active');
    });

    function applyFilter() {
      const q = searchEl.value.trim().toLowerCase();
      clearBtn.classList.toggle('visible', !!q);
      if (!q) { render(allUsers); return; }
      const filtered = allUsers.filter(u =>
        (u.name || '').toLowerCase().includes(q) ||
        (u.role || '').toLowerCase().includes(q) ||
        (u.bio || '').toLowerCase().includes(q)
      );
      render(filtered);
    }
    searchEl.addEventListener('input', applyFilter);
    clearBtn.addEventListener('click', () => { searchEl.value = ''; applyFilter(); searchEl.focus(); });

    function buildArtistList(profiles) {
      const arr = [];
      for (const key in profiles) {
        const p = profiles[key] || {};
        const name = (p.nickname || p.fullName || p.displayName || '').trim();
        if (!name) continue;
        if (!isPublicArtist(p)) continue;
        const links = [
          p.instagram, p.youtube, p.soundcloud, p.spotify, p.applemusic, p.bandcamp, p.tiktok, p.website
        ].filter(u => u && /^https?:\/\//.test(u));
        arr.push({
          key,
          name,
          role: 'Artist',
          avatar: p.profileImage || p.photoURL || p.profilePicture || '',
          bio: p.bio || '',
          links,
          profile: p,
        });
      }
      arr.sort((a, b) => a.name.localeCompare(b.name));
      return arr;
    }

    function showLoadError(msg) {
      gridEl.innerHTML = `<div class="state-msg"><span class="material-symbols-outlined">error</span><br>${escHtml(msg || 'Could not load users.')}<br><button id="usersRetryBtn" style="margin-top:12px;padding:8px 16px;border:none;border-radius:8px;background:var(--coral,#ff7a59);color:#fff;font-weight:700;cursor:pointer;">Retry</button></div>`;
      const btn = document.getElementById('usersRetryBtn');
      if (btn) btn.addEventListener('click', () => { gridEl.innerHTML = `<div class="state-msg"><span class="material-symbols-outlined">hourglass_top</span><br>Loading users…</div>`; loadUsers(); });
    }

    let _renderedFromCache = false;
    let _restRendered = false;

    // REST first — bypasses the WebSocket entirely, so a flaky/slow
    // realtime connection can't leave the page hanging on a blank screen.
    function loadUsersViaREST() {
      const url = 'https://asteroid-cdc13-default-rtdb.firebaseio.com/PROFILES.json';
      return fetch(url, { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(data => {
          if (allUsers.length) return; // SDK already won
          if (!data) {
            gridEl.innerHTML = `<div class="state-msg"><span class="material-symbols-outlined">group_off</span><br>No users yet.</div>`;
            _restRendered = true;
            return;
          }
          const arr = buildArtistList(data);
          allUsers = arr;
          render(arr);
          _restRendered = true;
          console.log('[users] rendered via REST:', arr.length, 'profiles');
        });
    }

    function loadUsers() {
      _renderedFromCache = false;
      _restRendered = false;

      // Kick off REST immediately — usually completes in 1-2s and unblocks the UI.
      loadUsersViaREST().catch(err => {
        console.warn('[users] REST load failed:', err && (err.message || err));
        // Only show the error wall if the SDK also hasn't rendered yet.
        if (!allUsers.length) {
          showLoadError('Could not load users. Check your connection.');
        }
      });

      // SDK onValue runs in parallel for live updates (new sign-ups, profile edits).
      // No timeout-driven error wall here anymore — REST already covers initial paint.
      try {
        onValue(ref(db, 'PROFILES'), (snap) => {
          if (!snap.exists()) {
            if (!_restRendered) {
              gridEl.innerHTML = `<div class="state-msg"><span class="material-symbols-outlined">group_off</span><br>No users yet.</div>`;
            }
            return;
          }
          const arr = buildArtistList(snap.val() || {});
          allUsers = arr;
          render(arr);
          _renderedFromCache = true;
        }, (err) => {
          console.error('[users] PROFILES onValue error:', err);
          // REST will have already painted (or failed loud); don't double-error.
        });
      } catch (e) {
        console.error('[users] onValue threw:', e);
      }
    }
    loadUsers();
  </script>
  <script src="js/miniplayer.js" defer></script>
</body>
</html>
