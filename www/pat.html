<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Playlist · Asteroid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050810;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: max(14px, env(safe-area-inset-top)) 16px 14px;
      background: rgba(5,8,16,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,127,80,0.12);
    }
    .topbar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .topbar-back:hover { background: rgba(255,255,255,0.1); }
    .topbar-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .topbar-title span { color: #ff7f50; }
    .topbar-count {
      margin-left: auto;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    /* ── Page content ── */
    .page { max-width: 680px; margin: 0 auto; padding: 24px 16px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: rgba(255,255,255,0.35);
    }
    .empty-state .material-symbols-outlined {
      font-size: 56px;
      display: block;
      margin-bottom: 16px;
      color: rgba(255,127,80,0.4);
    }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .empty-state a { color: #ff7f50; text-decoration: none; font-weight: 600; }

    /* ── Song list ── */
    #playlist { display: flex; flex-direction: column; gap: 10px; }

    .song-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px;
      transition: background 0.15s, border-color 0.15s;
    }
    .song-row:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,127,80,0.2); }
    .song-row.playing { border-color: rgba(255,127,80,0.45); background: rgba(255,127,80,0.07); }

    /* Number / play button */
    .song-num {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      position: relative;
    }
    .song-num .play-icon {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      color: #ff7f50;
    }
    .song-num .play-icon .material-symbols-outlined { font-size: 28px; }
    .song-row:hover .song-num .num-label { display: none; }
    .song-row:hover .song-num .play-icon { display: flex; }
    .song-row.playing .song-num .num-label { display: none; }
    .song-row.playing .song-num .play-icon { display: flex; }

    /* Song art placeholder */
    .song-art {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,127,80,0.25), rgba(255,78,42,0.12));
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .song-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .song-art .material-symbols-outlined { font-size: 22px; color: rgba(255,127,80,0.6); }

    /* Song info */
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .song-artist {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-row.playing .song-title { color: #ff7f50; }

    /* Delete button */
    .song-delete {
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .song-delete:hover { color: #f87171; background: rgba(248,113,113,0.1); }
    .song-delete .material-symbols-outlined { font-size: 20px; }

    /* Audio element (hidden — we use global player if available, else this) */
    audio.song-audio { display: none; }

    /* ── Bottom nav ── */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0a0a0a;
      border-top: 1px solid rgba(255,127,80,0.25);
      padding: 6px 0 max(6px, env(safe-area-inset-bottom));
      justify-content: space-around;
      align-items: center;
      z-index: 10000;
    }
    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 10px;
      transition: color 0.2s, background 0.2s;
    }
    .mobile-nav-item .material-symbols-outlined { font-size: 24px; }
    .mobile-nav-item:hover, .mobile-nav-item.mobile-nav-active { color: #ff7f50; }
    .mobile-nav-item.mobile-nav-active { background: rgba(255,127,80,0.1); }
    @media (max-width: 3840px) {
      .mobile-nav { display: flex !important; }
      body { padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
    }
  </style>
</head>
<body>
  <script src="auth.js"></script>

  <div class="topbar">
    <a href="index.html" class="topbar-back">
      <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
      Home
    </a>
    <div class="topbar-title">My <span>Playlist</span></div>
    <div class="topbar-count" id="songCount"></div>
  </div>

  <div class="page">
    <div id="playlist"></div>
  </div>

  <nav class="mobile-nav">
    <a href="index.html" class="mobile-nav-item"><span class="material-symbols-outlined">home</span><span>Home</span></a>
    <a href="lively.html" class="mobile-nav-item"><span class="material-symbols-outlined">mic</span><span>Concerts</span></a>
    <a href="studio.html" class="mobile-nav-item"><span class="material-symbols-outlined">upload</span><span>Upload</span></a>
    <a href="pat.html" class="mobile-nav-item mobile-nav-active"><span class="material-symbols-outlined">queue_music</span><span>Playlist</span></a>
    <a href="charts.html" class="mobile-nav-item"><span class="material-symbols-outlined">leaderboard</span><span>Charts</span></a>
  </nav>

  <script>
    var PAT_RTDB_BASE = 'https://asteroid-cdc13-default-rtdb.firebaseio.com';

    /** Same UID derivation as index.html __saveSongToPersonalPlaylistFromDataset + miniplayer firebaseSaveToPlaylist. */
    function patPlaylistUid() {
      return String(
        (localStorage.getItem('userEmail') || localStorage.getItem('email') || localStorage.getItem('CurrentUser') || '').trim()
      ).replace(/[.#$[\]]/g, '_');
    }
    function patSongIdFromSrc(src) {
      return String(src || '').replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 180);
    }

    function playlistStorageKey() {
      return (typeof authScopedKey === 'function') ? authScopedKey('playlists') : 'playlists_guest';
    }

    function getPlaylist() {
      var currentUser = (localStorage.getItem('CurrentUser') || localStorage.getItem('email') || '').trim();
      var pk = playlistStorageKey();
      var playlist = [];
      try { playlist = JSON.parse(localStorage.getItem(pk) || '[]'); } catch (e) {}
      if (!Array.isArray(playlist)) playlist = [];
      // Legacy migration
      if (playlist.length === 0 && currentUser) {
        try {
          var legacy = JSON.parse(localStorage.getItem('userPlaylists') || '{}') || {};
          if (legacy[currentUser] && Array.isArray(legacy[currentUser])) {
            playlist = legacy[currentUser];
            localStorage.setItem(pk, JSON.stringify(playlist));
          }
        } catch (e) {}
      }
      return playlist;
    }

    /** Pull PLAYLISTS/{uid} from Firebase via REST, merge with localStorage, persist, re-render. */
    function syncPlaylistFromFirebase() {
      var uid = patPlaylistUid();
      if (!uid) return Promise.resolve();
      return fetch(PAT_RTDB_BASE + '/PLAYLISTS/' + uid + '.json', { cache: 'no-store' })
        .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function (remote) {
          if (!remote || typeof remote !== 'object') {
            console.log('[pat] Firebase playlist empty for', uid);
            return;
          }
          var local = getPlaylist();
          var bySrc = {};
          local.forEach(function (s) { if (s && s.src) bySrc[s.src] = s; });
          var added = 0;
          Object.keys(remote).forEach(function (sid) {
            var entry = remote[sid] || {};
            if (!entry.src) return;
            if (!bySrc[entry.src]) {
              bySrc[entry.src] = {
                title: entry.title || 'Unknown',
                artist: entry.artist || 'Unknown artist',
                src: entry.src,
                imageUrl: entry.imageUrl || ''
              };
              added++;
            }
          });
          var merged = Object.keys(bySrc).map(function (k) { return bySrc[k]; });
          var pk = playlistStorageKey();
          try { localStorage.setItem(pk, JSON.stringify(merged)); } catch (e) {}
          console.log('[pat] Firebase sync: pulled', Object.keys(remote).length, '— added', added, 'new');
          render();
        })
        .catch(function (err) {
          console.warn('[pat] Firebase sync failed:', err && (err.message || err));
        });
    }

    /** Remove a song from Firebase via REST DELETE on PLAYLISTS/{uid}/{sid}. */
    function deleteSongFromFirebase(src) {
      var uid = patPlaylistUid();
      if (!uid || !src) return;
      var sid = patSongIdFromSrc(src);
      fetch(PAT_RTDB_BASE + '/PLAYLISTS/' + uid + '/' + sid + '.json', { method: 'DELETE' })
        .then(function (r) {
          if (!r.ok) console.warn('[pat] Firebase delete HTTP', r.status);
          else console.log('[pat] Firebase delete OK:', sid);
        })
        .catch(function (err) { console.warn('[pat] Firebase delete failed:', err); });
    }

    var currentAudio = null;
    var currentRow = null;

    function playSong(row, src, title, artist) {
      // Prefer global player from index.html if available
      if (window.playRecommendedSong) {
        window.playRecommendedSong({ fileInp: src, title: title, artist: artist });
        if (currentRow) currentRow.classList.remove('playing');
        currentRow = row;
        row.classList.add('playing');
        return;
      }
      // Fallback: local audio
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      if (currentRow) currentRow.classList.remove('playing');
      if (currentRow === row) { currentRow = null; return; }
      var audio = new Audio(src);
      audio.play().catch(function() {});
      audio.onended = function() { row.classList.remove('playing'); currentAudio = null; currentRow = null; };
      currentAudio = audio;
      currentRow = row;
      row.classList.add('playing');
    }

    function deleteSong(index) {
      var pk = playlistStorageKey();
      var playlist = [];
      try { playlist = JSON.parse(localStorage.getItem(pk) || '[]'); } catch (e) {}
      if (!Array.isArray(playlist)) playlist = [];
      var removed = playlist[index];
      playlist.splice(index, 1);
      localStorage.setItem(pk, JSON.stringify(playlist));
      if (removed && removed.src) deleteSongFromFirebase(removed.src);
      render();
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function render() {
      var playlist = getPlaylist();
      var container = document.getElementById('playlist');
      var countEl = document.getElementById('songCount');
      if (countEl) countEl.textContent = playlist.length ? playlist.length + (playlist.length === 1 ? ' song' : ' songs') : '';

      if (playlist.length === 0) {
        container.innerHTML = '<div class="empty-state">' +
          '<span class="material-symbols-outlined">queue_music</span>' +
          '<p>Your playlist is empty.<br>Add songs from the <a href="index.html">home page</a>.</p>' +
          '</div>';
        return;
      }

      container.innerHTML = '';
      playlist.forEach(function(song, i) {
        var row = document.createElement('div');
        row.className = 'song-row';

        var artHtml = song.imageUrl
          ? '<div class="song-art"><img src="' + esc(song.imageUrl) + '" alt="" loading="lazy"></div>'
          : '<div class="song-art"><span class="material-symbols-outlined">music_note</span></div>';

        row.innerHTML =
          '<div class="song-num">' +
            '<span class="num-label">' + (i + 1) + '</span>' +
            '<span class="play-icon"><span class="material-symbols-outlined">play_circle</span></span>' +
          '</div>' +
          artHtml +
          '<div class="song-info">' +
            '<div class="song-title">' + esc(song.title || 'Unknown') + '</div>' +
            '<div class="song-artist">' + esc(song.artist || 'Unknown artist') + '</div>' +
          '</div>' +
          '<button class="song-delete" aria-label="Remove">' +
            '<span class="material-symbols-outlined">delete</span>' +
          '</button>';

        row.querySelector('.song-num').addEventListener('click', function() {
          playSong(row, song.src, song.title, song.artist);
        });
        row.querySelector('.song-info').addEventListener('click', function() {
          playSong(row, song.src, song.title, song.artist);
        });
        row.querySelector('.song-delete').addEventListener('click', function(e) {
          e.stopPropagation();
          deleteSong(i);
        });

        container.appendChild(row);
      });
    }

    window.addEventListener('DOMContentLoaded', function() {
      var currentUser = (localStorage.getItem('CurrentUser') || localStorage.getItem('email') || '').trim();
      if (!currentUser) {
        window.location.href = 'index.html';
        return;
      }
      render();
      // Pull any songs the user added on another device — runs in parallel with the local render.
      syncPlaylistFromFirebase();
    });
  </script>
</body>
</html>
